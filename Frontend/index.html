<!Doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>Job Application Tracker</h1>

    <div class="card">
      <h2>Add Job</h2>
      <input type="text" id="company" placeholder="Company">
      <input type="text" id="role" placeholder="Role">
      <button onclick="createJob()">Add Job</button>
    </div>

    <div class="card">
      <h2>Dashboard</h2>
      <div id="stats" style="display:flex; gap:15px; flex-wrap:wrap;">
        <div class="stat-box">Total: <span id="totalCount">0</span></div>
        <div class="stat-box">Applied: <span id="appliedCount">0</span></div>
        <div class="stat-box">Interview: <span id="interviewCount">0</span></div>
        <div class="stat-box">Offer: <span id="offerCount">0</span></div>
        <div class="stat-box">Rejected: <span id="rejectedCount">0</span></div>
      </div>
    </div>

    <div class="card">
      <h2>All Jobs</h2>
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <input
          type="text"
          id="searchInput"
          placeholder="Search company or role..."
          oninput="filterJobs()"
        >

        <select id="statusFilter" onchange="filterJobs()" id="statusFilter">
          <option value="">ALL</option>
          <option value="applied">Applied</option>
          <option value="interview">Interview</option>
          <option value="offer">Offer</option>
          <option value="rejected">Rejected</option>
        </select>
        
      </div>    

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th onclick="sortJobs('company')">Company </th>
            <th onclick="sortJobs('role')">Role </th>
            <th onclick="sortJobs('status')">Status </th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="jobsTable"></tbody>
      </table>
    </div>

  </div>  

  <script src="script.js"></script>
  <div id="toast" class="toast"></div>
</body>
</html>
